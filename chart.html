<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BiddyFX Chart Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Rajdhani:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;0,900;1,400&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root{
  --gold:#C9A84C;--gold2:#F0D080;--gold3:#8B6914;
  --bg:#000;--bg2:#060606;--bg3:#0A0A0A;--bg4:#0f0f0f;
  --border:#161616;--border2:#1f1f1f;--border3:#2a2a2a;
  --green:#00C896;--red:#FF4444;--blue:#4A9EFF;--purple:#A855F7;--orange:#F97316;
  --text:#D4C5A9;--muted:#3a3a3a;--dim:#222;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;}

/* ── TOPBAR ──────────────────────────────────────────────── */
#topbar{
  height:48px;background:var(--bg2);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0;flex-shrink:0;position:relative;z-index:100;
}
.tb-logo{padding:0 18px;border-right:1px solid var(--border);height:100%;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.tb-logo-text{font-family:'Playfair Display',serif;font-size:16px;font-weight:900;color:var(--gold);}
.tb-logo-text em{font-style:italic;color:#fff;}
.tb-logo-tag{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;}

/* Symbol search */
.tb-symbol{padding:0 14px;border-right:1px solid var(--border);height:100%;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .2s;min-width:180px;position:relative;}
.tb-symbol:hover{background:rgba(255,255,255,.02);}
.tb-sym-name{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;color:#fff;}
.tb-sym-cat{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;}
.tb-sym-price{font-family:'Space Mono',monospace;font-size:12px;margin-left:auto;}
.tb-sym-price.up{color:var(--green);}
.tb-sym-price.dn{color:var(--red);}

/* Timeframe pills */
.tb-tfs{display:flex;align-items:center;padding:0 8px;border-right:1px solid var(--border);height:100%;gap:2px;flex-shrink:0;}
.tf-btn{background:none;border:none;color:var(--muted);font-family:'Space Mono',monospace;font-size:10px;padding:5px 8px;cursor:pointer;transition:all .2s;letter-spacing:.04em;}
.tf-btn:hover{color:var(--text);}
.tf-btn.active{background:rgba(201,168,76,.12);color:var(--gold);border:1px solid rgba(201,168,76,.2);}

/* Chart type */
.tb-chart-types{display:flex;align-items:center;padding:0 8px;border-right:1px solid var(--border);height:100%;gap:2px;}
.ct-btn{background:none;border:none;color:var(--muted);font-size:14px;padding:5px 7px;cursor:pointer;transition:all .2s;}
.ct-btn.active{color:var(--gold);}
.ct-btn:hover{color:var(--text);}

/* Indicators button */
.tb-ind-btn{background:none;border:1px solid var(--border2);color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:6px 12px;cursor:pointer;transition:all .25s;margin:0 8px;flex-shrink:0;}
.tb-ind-btn:hover{border-color:var(--gold);color:var(--gold);}

/* Price info bar */
.tb-ohlc{display:flex;align-items:center;gap:14px;padding:0 14px;font-family:'Space Mono',monospace;font-size:10px;flex:1;}
.ohlc-item{display:flex;gap:4px;}
.ohlc-label{color:var(--muted);}
.ohlc-val{color:var(--text);}
.ohlc-chg.up{color:var(--green);}
.ohlc-chg.dn{color:var(--red);}

/* Right controls */
.tb-right{display:flex;align-items:center;gap:0;margin-left:auto;flex-shrink:0;}
.tb-icon-btn{background:none;border:none;border-left:1px solid var(--border);color:var(--muted);width:42px;height:48px;cursor:pointer;font-size:14px;transition:all .2s;display:flex;align-items:center;justify-content:center;}
.tb-icon-btn:hover{color:var(--gold);background:rgba(201,168,76,.04);}
.tb-icon-btn.active{color:var(--gold);background:rgba(201,168,76,.06);}
.tb-home{border-left:1px solid var(--border);padding:0 14px;height:48px;display:flex;align-items:center;}
.tb-home a{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);text-decoration:none;letter-spacing:.1em;text-transform:uppercase;transition:color .2s;}
.tb-home a:hover{color:var(--gold);}

/* ── LAYOUT ──────────────────────────────────────────────── */
#appLayout{display:flex;height:calc(100vh - 48px);}

/* ── DRAWING TOOLBAR (LEFT) ──────────────────────────────── */
#drawToolbar{
  width:44px;background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;
  flex-shrink:0;overflow-y:auto;z-index:50;
}
.dt-sep{width:28px;height:1px;background:var(--border);margin:4px 0;}
.dt-btn{
  width:34px;height:34px;background:none;border:none;border-radius:3px;
  color:var(--muted);font-size:13px;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;position:relative;
  font-family:'Space Mono',monospace;font-size:11px;
}
.dt-btn:hover{background:rgba(255,255,255,.04);color:var(--text);}
.dt-btn.active{background:rgba(201,168,76,.12);color:var(--gold);border:1px solid rgba(201,168,76,.2);}
.dt-tooltip{
  position:absolute;left:42px;top:50%;transform:translateY(-50%);
  background:#111;border:1px solid var(--border2);color:var(--text);
  font-family:'Space Mono',monospace;font-size:9px;white-space:nowrap;
  padding:5px 10px;letter-spacing:.06em;pointer-events:none;
  opacity:0;transition:opacity .2s;z-index:200;
}
.dt-btn:hover .dt-tooltip{opacity:1;}

/* ── CHART AREA ──────────────────────────────────────────── */
#chartArea{flex:1;display:flex;flex-direction:column;position:relative;overflow:hidden;}
#chartContainer{flex:1;position:relative;}
#mainChart{width:100%;height:100%;}
#overlayCanvas{position:absolute;inset:0;pointer-events:none;z-index:10;}
#drawCanvas{position:absolute;inset:0;z-index:20;cursor:crosshair;display:none;}

/* Sub-chart panels */
#subCharts{display:flex;flex-direction:column;}
.sub-chart-panel{position:relative;border-top:1px solid var(--border);flex-shrink:0;}
.sub-chart-label{position:absolute;top:6px;left:10px;font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);z-index:5;pointer-events:none;}
.sub-chart-close{position:absolute;top:4px;right:6px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;z-index:5;transition:color .2s;}
.sub-chart-close:hover{color:var(--red);}

/* ── RIGHT PANEL ─────────────────────────────────────────── */
#rightPanel{
  width:280px;background:var(--bg2);border-left:1px solid var(--border);
  display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;
  transition:width .3s;
}
#rightPanel.hidden{width:0;overflow:hidden;}
.rp-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.rp-tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:11px 6px;cursor:pointer;transition:all .25s;margin-bottom:-1px;}
.rp-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.rp-body{flex:1;overflow-y:auto;padding:14px;}
.rp-section{margin-bottom:18px;}
.rp-section-title{font-family:'Space Mono',monospace;font-size:8px;color:var(--gold);letter-spacing:.18em;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}

/* Symbol list */
.sym-cat{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;padding:8px 0 4px;}
.sym-item{display:flex;align-items:center;justify-content:space-between;padding:8px 6px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s;border-radius:2px;}
.sym-item:hover{background:rgba(255,255,255,.02);}
.sym-item.active{background:rgba(201,168,76,.06);}
.sym-left{display:flex;flex-direction:column;}
.sym-name{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;color:var(--text);}
.sym-full{font-size:10px;color:var(--muted);margin-top:1px;}
.sym-right{display:flex;flex-direction:column;align-items:flex-end;}
.sym-price{font-family:'Space Mono',monospace;font-size:11px;color:var(--text);}
.sym-chg{font-family:'Space Mono',monospace;font-size:9px;}
.sym-chg.up{color:var(--green);}
.sym-chg.dn{color:var(--red);}

/* Indicator list */
.ind-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);}
.ind-name{font-size:12px;font-weight:600;color:var(--text);}
.ind-desc{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;}
.ind-toggle{background:none;border:1px solid var(--border2);color:var(--muted);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.08em;padding:4px 10px;cursor:pointer;transition:all .25s;}
.ind-toggle.on{border-color:var(--green);color:var(--green);background:rgba(0,200,150,.06);}
.ind-toggle:hover{border-color:var(--gold);color:var(--gold);}

/* Drawings list */
.draw-item{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.draw-icon{font-size:12px;flex-shrink:0;}
.draw-name{font-size:12px;color:var(--text);flex:1;}
.draw-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;transition:color .2s;}
.draw-del:hover{color:var(--red);}

/* ── SYMBOL SEARCH DROPDOWN ──────────────────────────────── */
#symSearch{
  position:absolute;top:48px;left:0;width:340px;
  background:var(--bg3);border:1px solid var(--border2);border-top:none;
  z-index:500;display:none;max-height:70vh;overflow-y:auto;
}
#symSearchInput{
  width:100%;background:#000;border:none;border-bottom:1px solid var(--border2);
  color:var(--text);font-family:'Space Mono',monospace;font-size:12px;
  padding:12px 14px;outline:none;
}
.ss-cat{font-family:'Space Mono',monospace;font-size:8px;color:var(--gold);letter-spacing:.16em;text-transform:uppercase;padding:10px 14px 4px;border-top:1px solid var(--border);}
.ss-item{display:flex;align-items:center;justify-content:space-between;padding:9px 14px;cursor:pointer;transition:background .15s;}
.ss-item:hover,.ss-item.focused{background:rgba(201,168,76,.06);}
.ss-sym{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:#fff;}
.ss-full{font-size:11px;color:var(--muted);margin-top:1px;}
.ss-type{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);text-transform:uppercase;}

/* ── INDICATOR MODAL ─────────────────────────────────────── */
#indModal{display:none;position:absolute;inset:0;background:rgba(0,0,0,.85);z-index:400;align-items:center;justify-content:center;}
#indModal.open{display:flex;}
.ind-modal-box{background:var(--bg3);border:1px solid var(--border2);width:580px;max-height:80vh;display:flex;flex-direction:column;}
.imb-head{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.imb-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:#fff;}
.imb-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;}
.imb-search{padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.imb-search input{width:100%;background:#000;border:1px solid var(--border2);color:var(--text);font-family:'Space Mono',monospace;font-size:11px;padding:9px 12px;outline:none;}
.imb-body{flex:1;overflow-y:auto;padding:10px 0;}
.imb-cat{font-family:'Space Mono',monospace;font-size:8px;color:var(--gold);letter-spacing:.16em;text-transform:uppercase;padding:10px 16px 4px;border-top:1px solid var(--border);}
.imb-item{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;cursor:pointer;transition:background .15s;}
.imb-item:hover{background:rgba(255,255,255,.02);}
.imb-item-left .name{font-size:13px;font-weight:600;color:var(--text);}
.imb-item-left .desc{font-family:'Space Mono',monospace;font-size:9px;color:var(--muted);margin-top:2px;}
.imb-add{background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);color:var(--gold);font-family:'Space Mono',monospace;font-size:8px;letter-spacing:.1em;text-transform:uppercase;padding:5px 12px;cursor:pointer;transition:all .25s;}
.imb-add:hover,.imb-add.on{background:var(--gold);color:#000;}

/* ── CROSSHAIR TOOLTIP ───────────────────────────────────── */
#crosshairTooltip{
  position:absolute;pointer-events:none;z-index:30;
  background:rgba(10,10,10,.92);border:1px solid var(--border2);
  font-family:'Space Mono',monospace;font-size:10px;padding:8px 12px;
  display:none;white-space:nowrap;
}
.ct-row{display:flex;gap:12px;margin-bottom:2px;}
.ct-label{color:var(--muted);}
.ct-val{color:var(--text);}

/* ── STATUS BAR ──────────────────────────────────────────── */
#statusBar{
  height:22px;background:#000;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:14px;padding:0 12px;flex-shrink:0;
}
.sb-item{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);display:flex;align-items:center;gap:5px;}
.sb-dot{width:5px;height:5px;border-radius:50%;background:var(--green);}
.sb-dot.red{background:var(--red);}

/* ── SCROLLBAR ───────────────────────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px;}

/* ── MOBILE ──────────────────────────────────────────────── */
@media(max-width:768px){
  #rightPanel{display:none;}
  #drawToolbar{width:36px;}
  .dt-btn{width:28px;height:28px;}
  .tb-ohlc{display:none;}
  #topbar{overflow-x:auto;}
}
</style>
</head>
<body>

<!-- ── TOPBAR ──────────────────────────────────────────────── -->
<div id="topbar">
  <div class="tb-logo">
    <div>
      <div class="tb-logo-text">Biddy<em>FX</em></div>
      <div class="tb-logo-tag">Charts</div>
    </div>
  </div>

  <div class="tb-symbol" id="symbolBtn" onclick="toggleSymSearch()">
    <div>
      <div class="tb-sym-name" id="tbSymName">EUR/USD</div>
      <div class="tb-sym-cat" id="tbSymCat">Forex</div>
    </div>
    <div class="tb-sym-price" id="tbSymPrice">—</div>
  </div>

  <div class="tb-tfs">
    <button class="tf-btn" onclick="setTF('1min')">1m</button>
    <button class="tf-btn" onclick="setTF('5min')">5m</button>
    <button class="tf-btn" onclick="setTF('15min')">15m</button>
    <button class="tf-btn" onclick="setTF('30min')">30m</button>
    <button class="tf-btn active" onclick="setTF('1h')">1H</button>
    <button class="tf-btn" onclick="setTF('4h')">4H</button>
    <button class="tf-btn" onclick="setTF('1day')">D</button>
    <button class="tf-btn" onclick="setTF('1week')">W</button>
    <button class="tf-btn" onclick="setTF('1month')">M</button>
  </div>

  <div class="tb-chart-types">
    <button class="ct-btn active" id="ctCandle" onclick="setChartType('candle')" title="Candlestick">🕯</button>
    <button class="ct-btn" id="ctBar" onclick="setChartType('bar')" title="OHLC Bars">☰</button>
    <button class="ct-btn" id="ctLine" onclick="setChartType('line')" title="Line">📈</button>
    <button class="ct-btn" id="ctArea" onclick="setChartType('area')" title="Area">▽</button>
    <button class="ct-btn" id="ctHeikin" onclick="setChartType('heikin')" title="Heikin Ashi">⬡</button>
  </div>

  <button class="tb-ind-btn" onclick="openIndModal()">⚡ Indicators</button>

  <div class="tb-ohlc" id="ohlcBar">
    <div class="ohlc-item"><span class="ohlc-label">O</span><span class="ohlc-val" id="oO">—</span></div>
    <div class="ohlc-item"><span class="ohlc-label">H</span><span class="ohlc-val" id="oH">—</span></div>
    <div class="ohlc-item"><span class="ohlc-label">L</span><span class="ohlc-val" id="oL">—</span></div>
    <div class="ohlc-item"><span class="ohlc-label">C</span><span class="ohlc-val" id="oC">—</span></div>
    <div class="ohlc-item"><span class="ohlc-chg" id="oChg">—</span></div>
  </div>

  <div class="tb-right">
    <button class="tb-icon-btn active" id="rpToggleBtn" onclick="toggleRightPanel()" title="Watchlist">☰</button>
    <button class="tb-icon-btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
    <button class="tb-icon-btn" onclick="takeScreenshot()" title="Screenshot">📷</button>
    <div class="tb-home"><a href="index.html">← Home</a></div>
  </div>
</div>

<!-- ── SYMBOL SEARCH ──────────────────────────────────────── -->
<div id="symSearch">
  <input type="text" id="symSearchInput" placeholder="Search symbol, name..." oninput="filterSymbols(this.value)" autofocus>
  <div id="symSearchResults"></div>
</div>

<!-- ── MAIN LAYOUT ────────────────────────────────────────── -->
<div id="appLayout">

  <!-- DRAWING TOOLBAR -->
  <div id="drawToolbar">
    <button class="dt-btn" id="dtCursor" onclick="setDrawTool('cursor')" title="Cursor">
      <span>↖</span><div class="dt-tooltip">Cursor</div>
    </button>
    <button class="dt-btn" onclick="setDrawTool('crosshair')" title="Crosshair">
      <span>✛</span><div class="dt-tooltip">Crosshair</div>
    </button>
    <div class="dt-sep"></div>

    <!-- Lines -->
    <button class="dt-btn" onclick="setDrawTool('trendline')"><span>╱</span><div class="dt-tooltip">Trendline</div></button>
    <button class="dt-btn" onclick="setDrawTool('hline')"><span>─</span><div class="dt-tooltip">Horizontal Line (S&R)</div></button>
    <button class="dt-btn" onclick="setDrawTool('vline')"><span>│</span><div class="dt-tooltip">Vertical Line</div></button>
    <button class="dt-btn" onclick="setDrawTool('ray')"><span>→</span><div class="dt-tooltip">Ray Line</div></button>
    <button class="dt-btn" onclick="setDrawTool('extended')"><span>↔</span><div class="dt-tooltip">Extended Line</div></button>
    <button class="dt-btn" onclick="setDrawTool('arrow')"><span>↗</span><div class="dt-tooltip">Arrow</div></button>
    <div class="dt-sep"></div>

    <!-- Channels -->
    <button class="dt-btn" onclick="setDrawTool('channel')"><span>⫝</span><div class="dt-tooltip">Parallel Channel</div></button>
    <button class="dt-btn" onclick="setDrawTool('pitchfork')"><span>⑂</span><div class="dt-tooltip">Pitchfork</div></button>
    <div class="dt-sep"></div>

    <!-- Shapes -->
    <button class="dt-btn" onclick="setDrawTool('rect')"><span>▭</span><div class="dt-tooltip">Rectangle / Zone</div></button>
    <button class="dt-btn" onclick="setDrawTool('circle')"><span>○</span><div class="dt-tooltip">Circle</div></button>
    <button class="dt-btn" onclick="setDrawTool('triangle')"><span>△</span><div class="dt-tooltip">Triangle</div></button>
    <div class="dt-sep"></div>

    <!-- Fibonacci -->
    <button class="dt-btn" onclick="setDrawTool('fib')"><span>Φ</span><div class="dt-tooltip">Fibonacci Retracement</div></button>
    <button class="dt-btn" onclick="setDrawTool('fibext')"><span>Φ↗</span><div class="dt-tooltip">Fibonacci Extension</div></button>
    <button class="dt-btn" onclick="setDrawTool('fibfan')"><span>Φ⁻</span><div class="dt-tooltip">Fibonacci Fan</div></button>
    <button class="dt-btn" onclick="setDrawTool('fibtime')"><span>ΦT</span><div class="dt-tooltip">Fibonacci Time Zones</div></button>
    <div class="dt-sep"></div>

    <!-- Patterns -->
    <button class="dt-btn" onclick="setDrawTool('headshoulders')"><span>⌇</span><div class="dt-tooltip">Head & Shoulders</div></button>
    <button class="dt-btn" onclick="setDrawTool('xabcd')"><span>XABCD</span><div class="dt-tooltip">XABCD Pattern</div></button>
    <div class="dt-sep"></div>

    <!-- Annotation -->
    <button class="dt-btn" onclick="setDrawTool('text')"><span>T</span><div class="dt-tooltip">Text Label</div></button>
    <button class="dt-btn" onclick="setDrawTool('callout')"><span>💬</span><div class="dt-tooltip">Callout</div></button>
    <button class="dt-btn" onclick="setDrawTool('price_label')"><span>$</span><div class="dt-tooltip">Price Label</div></button>
    <div class="dt-sep"></div>

    <!-- Measure -->
    <button class="dt-btn" onclick="setDrawTool('measure')"><span>⇔</span><div class="dt-tooltip">Measure / RR Tool</div></button>
    <button class="dt-btn" onclick="setDrawTool('ruler')"><span>📏</span><div class="dt-tooltip">Price Ruler</div></button>
    <div class="dt-sep"></div>

    <!-- Actions -->
    <button class="dt-btn" onclick="undoDrawing()" title="Undo"><span>↩</span><div class="dt-tooltip">Undo</div></button>
    <button class="dt-btn" onclick="clearDrawings()" title="Clear All"><span>🗑</span><div class="dt-tooltip">Clear All</div></button>
    <button class="dt-btn" onclick="saveDrawings()" title="Save"><span>💾</span><div class="dt-tooltip">Save Drawings</div></button>
  </div>

  <!-- CHART AREA -->
  <div id="chartArea">
    <div id="chartContainer">
      <div id="mainChart"></div>
      <canvas id="overlayCanvas"></canvas>
      <canvas id="drawCanvas"></canvas>
      <div id="crosshairTooltip"></div>
    </div>

      secondsVisible: false,

    },
  });

  mainSeries = createSeries('candle');
  resizeChart();
  window.addEventListener('resize', resizeChart);

  // Crosshair subscription
  chart.subscribeCrosshairMove(param => {
    if (!param.time || !param.seriesData.has(mainSeries)) return;
    const d = param.seriesData.get(mainSeries);
    if (!d) return;
    const dp = d.open !== undefined ? d : null;
    if (dp) {
      document.getElementById('oO').textContent = fmt(dp.open);
      document.getElementById('oH').textContent = fmt(dp.high);
      document.getElementById('oL').textContent = fmt(dp.low);
      document.getElementById('oC').textContent = fmt(dp.close);
      const chg = dp.close - dp.open;
      const pct = (chg / dp.open * 100).toFixed(2);
      const el = document.getElementById('oChg');
      el.textContent = (chg >= 0 ? '+' : '') + fmt(chg) + ' (' + pct + '%)';
      el.className = 'ohlc-chg ' + (chg >= 0 ? 'up' : 'dn');
    }
  });

  loadData();
  setInterval(updateClock, 1000);
  setInterval(updateWatchlistPrices, 15000);
}

function createSeries(type) {
  if (mainSeries) { try { chart.removeSeries(mainSeries); } catch(e){} }
  let s;
  const upColor = '#00C896', downColor = '#FF4444';
  const upAlpha = 'rgba(0,200,150,0.15)', downAlpha = 'rgba(255,68,68,0.15)';
  if (type === 'candle' || type === 'heikin') {
    s = chart.addCandlestickSeries({
      upColor, downColor,
      borderUpColor: upColor, borderDownColor: downColor,
      wickUpColor: upColor, wickDownColor: downColor,
    });
  } else if (type === 'bar') {
    s = chart.addBarSeries({ upColor, downColor });
  } else if (type === 'line') {
    s = chart.addLineSeries({ color: '#C9A84C', lineWidth: 2 });
  } else if (type === 'area') {
    s = chart.addAreaSeries({
      topColor: 'rgba(201,168,76,0.4)',
      bottomColor: 'rgba(201,168,76,0)',
      lineColor: '#C9A84C', lineWidth: 2,
    });
  }
  return s;
}

function resizeChart() {
  const container = document.getElementById('chartContainer');
  if (chart) chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
  resizeOverlay();
}

async function loadData() {
  setStatus('Loading ' + currentSymbol.s + '...', false);
  clearInterval(refreshInterval);

  try {
    const sym = currentSymbol.s.replace('/', ':');
    const url = `${BASE}/time_series?symbol=${sym}&interval=${currentTF}&outputsize=500&apikey=${API_KEY}`;
    const res = await fetch(url);
    const json = await res.json();

    if (json.status === 'error' || !json.values) {
      // Use generated demo data if API unavailable
      rawData = generateDemoData(currentSymbol.s, 500);
    } else {
      rawData = json.values.reverse().map(v => ({
        time: new Date(v.datetime).getTime() / 1000,
        open: parseFloat(v.open),
        high: parseFloat(v.high),
        low: parseFloat(v.low),
        close: parseFloat(v.close),
        volume: parseFloat(v.volume || 0),
      }));
    }

    let chartData = rawData;
    if (currentChartType === 'heikin') chartData = toHeikinAshi(rawData);
    if (currentChartType === 'line' || currentChartType === 'area') {
      chartData = rawData.map(d => ({ time: d.time, value: d.close }));
    }

    mainSeries.setData(chartData);
    updatePrice(rawData[rawData.length - 1]);
    renderActiveIndicators();
    setStatus('Live · ' + currentSymbol.s, true);
    loadDrawings();

    // Auto-refresh every 30s
    refreshInterval = setInterval(() => fetchLatestCandle(), 30000);
  } catch(e) {
    rawData = generateDemoData(currentSymbol.s, 500);
    mainSeries.setData(rawData);
    updatePrice(rawData[rawData.length - 1]);
    renderActiveIndicators();
    setStatus('Demo mode · ' + currentSymbol.s, false);
  }
}

async function fetchLatestCandle() {
  try {
    const sym = currentSymbol.s.replace('/','%2F');
    const url = `${BASE}/price?symbol=${sym}&apikey=${API_KEY}`;
    const res = await fetch(url);
    const json = await res.json();
    if (json.price) {
      const last = rawData[rawData.length - 1];
      const now = Math.floor(Date.now() / 1000);
      const price = parseFloat(json.price);
      mainSeries.update({ time: now, open: last.open, high: Math.max(last.high, price), low: Math.min(last.low, price), close: price });
      updatePrice({ ...last, close: price });
    }
  } catch(e){}
}

function generateDemoData(symbol, count) {
  // Realistic price seeding per symbol
  const seeds = {
    'EUR/USD':1.085,'GBP/USD':1.265,'USD/JPY':149.5,'XAU/USD':2050,
    'BTC/USD':67000,'ETH/USD':3400,'SPX':5200,'NDX':18000,'GBP/JPY':191,
    'AUD/USD':0.655,'USD/CHF':0.895,'NZD/USD':0.602,'VIX':15,
    'AAPL':175,'MSFT':415,'NVDA':800,'TSLA':175,'GOOGL':165,
  };
  let price = seeds[symbol] || 100;
  const vol = price * 0.001;
  const data = [];
  let t = Math.floor(Date.now()/1000) - count * 3600;
  const tfMap = {'1min':60,'5min':300,'15min':900,'30min':1800,'1h':3600,'4h':14400,'1day':86400,'1week':604800,'1month':2592000};
  const interval = tfMap[currentTF] || 3600;
  t = Math.floor(Date.now()/1000) - count * interval;
  for (let i = 0; i < count; i++) {
    const chg = (Math.random() - 0.499) * vol * 2;
    const open = price;
    price += chg;
    const high = Math.max(open, price) + Math.random() * vol;
    const low = Math.min(open, price) - Math.random() * vol;
    data.push({ time: t, open: +open.toFixed(5), high: +high.toFixed(5), low: +low.toFixed(5), close: +price.toFixed(5), volume: Math.floor(Math.random() * 5000 + 500) });
    t += interval;
  }
  return data;
}

function setChartType(type) {
  currentChartType = type;
  document.querySelectorAll('.ct-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('ct' + type.charAt(0).toUpperCase() + type.slice(1))?.classList.add('active');
  mainSeries = createSeries(type);
  let data = rawData;
  if (type === 'heikin') data = toHeikinAshi(rawData);
  if (type === 'line' || type === 'area') data = rawData.map(d => ({ time: d.time, value: d.close }));
  mainSeries.setData(data);
  renderActiveIndicators();
}

function toHeikinAshi(data) {
  return data.map((d, i) => {
    const prev = i > 0 ? data[i - 1] : d;
    const haClose = (d.open + d.high + d.low + d.close) / 4;
    const haOpen = (prev.open + prev.close) / 2;
    return { time: d.time, open: +haOpen.toFixed(5), high: +Math.max(d.high, haOpen, haClose).toFixed(5), low: +Math.min(d.low, haOpen, haClose).toFixed(5), close: +haClose.toFixed(5) };
  });
}

function filterSymbols(q) {
  const lower = q.toLowerCase();
  const container = document.getElementById('symSearchResults');
  container.innerHTML = '';
  let count = 0;
  Object.entries(SYMBOLS).forEach(([cat, syms]) => {
    const filtered = q ? syms.filter(s => s.s.toLowerCase().includes(lower) || s.f.toLowerCase().includes(lower)) : syms;
    if (!filtered.length) return;
    const catEl = document.createElement('div');
    catEl.className = 'ss-cat';
    catEl.textContent = cat;
    container.appendChild(catEl);
    filtered.forEach(sym => {
      const item = document.createElement('div');
      item.className = 'ss-item' + (sym.s === currentSymbol.s ? ' focused' : '');
      item.innerHTML = `<div><div class="ss-sym">${sym.s}</div><div class="ss-full">${sym.f}</div></div><div class="ss-type">${sym.t}</div>`;
      item.onclick = () => selectSymbol(sym);
      container.appendChild(item);
      count++;
      if (count > 80) return;
    });
  });
}

function selectSymbol(sym) {
  currentSymbol = sym;
  document.getElementById('tbSymName').textContent = sym.s;
  document.getElementById('tbSymCat').textContent = sym.t.charAt(0).toUpperCase() + sym.t.slice(1);
  document.getElementById('symSearch').style.display = 'none';
  symSearchOpen = false;
  loadData();

}

function renderActiveIndicators() {
  // Clear existing indicator series
  Object.values(indicatorSeries).forEach(s => { try { chart.removeSeries(s); } catch(e){} });
  indicatorSeries = {};
  document.getElementById('subCharts').innerHTML = '';
  subChartInstances = {};

  activeIndicators.forEach(id => {
    const def = Object.values(INDICATORS).flat().find(i => i.id === id);
    if (!def) return;
    if (def.pane) {
      renderSubIndicator(id, def);
    } else {
      renderOverlayIndicator(id, def);
    }
  });
}

function renderOverlayIndicator(id, def) {
  if (!rawData.length) return;
  const closes = rawData.map(d => d.close);
  const times = rawData.map(d => d.time);

  const addLine = (vals, color, lineWidth = 1) => {
    const s = chart.addLineSeries({ color, lineWidth, priceLineVisible: false, lastValueVisible: false });
    s.setData(vals.map((v, i) => ({ time: times[i], value: v })).filter(d => d.value !== null && !isNaN(d.value)));
    indicatorSeries[id + '_' + Math.random()] = s;
    return s;
  };

  if (id === 'ema' || id === 'sma' || id === 'wma' || id === 'dema' || id === 'tema' || id === 'hull') {
    const period = def.params.period || 20;
    addLine(calcMA(closes, period, id), def.color, 1.5);
  } else if (id === 'vwap') {
    addLine(calcVWAP(rawData), def.color, 1.5);
  } else if (id === 'bb') {
    const { upper, middle, lower } = calcBB(closes, def.params.period || 20, def.params.std || 2);
    addLine(upper, 'rgba(74,158,255,0.6)', 1);
    addLine(middle, 'rgba(74,158,255,0.4)', 1);
    addLine(lower, 'rgba(74,158,255,0.6)', 1);
  } else if (id === 'pivot') {
    const pivots = calcPivots(rawData);
    pivots.forEach(({ val, color }) => addLine(Array(times.length).fill(val), color, 0.8));
  } else if (id === 'supertrend') {
    const st = calcSupertrend(rawData, def.params.period || 10, def.params.mult || 3);
    const stUp = chart.addLineSeries({ color: '#00C896', lineWidth: 1.5, priceLineVisible: false, lastValueVisible: false });
    const stDn = chart.addLineSeries({ color: '#FF4444', lineWidth: 1.5, priceLineVisible: false, lastValueVisible: false });
    stUp.setData(st.filter(d => d.dir === 1));
    stDn.setData(st.filter(d => d.dir === -1));
    indicatorSeries[id + '_up'] = stUp;
    indicatorSeries[id + '_dn'] = stDn;
  } else if (id === 'ichimoku') {
    const ichi = calcIchimoku(rawData);
    addLine(ichi.tenkan, '#F97316', 1);
    addLine(ichi.kijun, '#4A9EFF', 1);
    addLine(ichi.senkouA, '#00C896', 1);
    addLine(ichi.senkouB, '#FF4444', 1);
    // Cloud fill using area series approximation
    const cloudSeries = chart.addAreaSeries({ topColor:'rgba(0,200,150,0.06)', bottomColor:'rgba(255,68,68,0.06)', lineColor:'transparent', lineWidth: 0, priceLineVisible: false });
    cloudSeries.setData(ichi.senkouA.map((v, i) => ({ time: times[i], value: v })).filter(d => !isNaN(d.value)));
    indicatorSeries[id + '_cloud'] = cloudSeries;
  } else if (id === 'parabolicsar' || id === 'psar') {
    const sar = calcParabolicSAR(rawData);
    const s = chart.addLineSeries({ color: '#FF4444', lineWidth: 0, priceLineVisible: false, lastValueVisible: false,
      pointMarkers: sar.map(d => ({ time: d.time, position: d.bull ? 'belowBar' : 'aboveBar', color: d.bull ? '#00C896' : '#FF4444', shape: 'circle', size: 0.5 }))
    });
    indicatorSeries[id] = s;
  } else if (id === 'kc') {
    const { upper, middle, lower } = calcKeltner(rawData, def.params.period || 20, def.params.mult || 2);
    addLine(upper, 'rgba(249,115,22,0.6)', 1);
    addLine(middle, 'rgba(249,115,22,0.4)', 1);
    addLine(lower, 'rgba(249,115,22,0.6)', 1);
  } else if (id === 'donchian') {
    const { upper, lower } = calcDonchian(closes, def.params.period || 20);
    addLine(upper, 'rgba(201,168,76,0.5)', 1);
    addLine(lower, 'rgba(201,168,76,0.5)', 1);
  } else if (id === 'linear_reg') {
    addLine(calcLinearReg(closes, def.params.period || 100), '#4A9EFF', 1.5);
  } else if (id === 'zigzag') {
    addLine(calcZigZag(rawData, def.params.deviation || 5), '#C9A84C', 1.5);
  }
}

function renderSubIndicator(id, def) {
  if (!rawData.length) return;
  const closes = rawData.map(d => d.close);
  const times = rawData.map(d => d.time);
  const panel = document.createElement('div');
  panel.className = 'sub-chart-panel';
  panel.style.height = '120px';
  panel.id = 'subPanel_' + id;
  const label = document.createElement('div');
  label.className = 'sub-chart-label';
  label.textContent = def.name;
  const closeBtn = document.createElement('button');
  closeBtn.className = 'sub-chart-close';
  closeBtn.textContent = '✕';
  closeBtn.onclick = () => removeIndicator(id);
  const chartDiv = document.createElement('div');
  chartDiv.style.width = '100%';
  chartDiv.style.height = '100%';
  chartDiv.id = 'subChart_' + id;
  panel.appendChild(label);
  panel.appendChild(closeBtn);
  panel.appendChild(chartDiv);
  document.getElementById('subCharts').appendChild(panel);

  const sub = LightweightCharts.createChart(chartDiv, {
    layout: { background: { color: '#000' }, textColor: '#444', fontFamily: "'Space Mono',monospace", fontSize: 9 },
    grid: { vertLines: { color: '#0a0a0a' }, horzLines: { color: '#0a0a0a' } },
    rightPriceScale: { borderColor: '#161616', textColor: '#333', scaleMargins: { top: 0.1, bottom: 0.1 } },
    timeScale: { borderColor: '#161616', visible: false },
    crosshair: { vertLine: { color: '#222' }, horzLine: { color: '#222' } },
    handleScroll: false, handleScale: false,
    width: chartDiv.parentElement.clientWidth, height: 120,
  });
  subChartInstances[id] = sub;

  const addSubLine = (vals, color, lw = 1) => {
    const s = sub.addLineSeries({ color, lineWidth: lw, priceLineVisible: false, lastValueVisible: true });
    s.setData(vals.map((v, i) => ({ time: times[i], value: v })).filter(d => d.value !== null && !isNaN(d.value)));
    return s;
  };

  if (id === 'vol') {
    const hs = sub.addHistogramSeries({ color: 'rgba(201,168,76,0.35)', priceLineVisible: false });
    hs.setData(rawData.map(d => ({ time: d.time, value: d.volume || 0, color: d.close >= d.open ? 'rgba(0,200,150,0.35)' : 'rgba(255,68,68,0.35)' })));
    indicatorSeries[id] = hs;
  } else if (id === 'rsi') {
    const rsi = calcRSI(closes, def.params.period || 14);
    addSubLine(rsi, '#A855F7', 1.5);
    addSubLine(Array(times.length).fill(70), 'rgba(255,68,68,0.3)', 0.8);
    addSubLine(Array(times.length).fill(30), 'rgba(0,200,150,0.3)', 0.8);
    addSubLine(Array(times.length).fill(50), 'rgba(255,255,255,0.05)', 0.5);
  } else if (id === 'macd') {
    const { macdLine, signalLine, hist } = calcMACD(closes, def.params.fast||12, def.params.slow||26, def.params.signal||9);
    const hs = sub.addHistogramSeries({ color: '#4A9EFF', priceLineVisible: false, lastValueVisible: false });
    hs.setData(hist.map((v, i) => ({ time: times[i], value: v, color: v >= 0 ? 'rgba(0,200,150,0.5)' : 'rgba(255,68,68,0.5)' })).filter(d => !isNaN(d.value)));
    addSubLine(macdLine, '#4A9EFF', 1.2);
    addSubLine(signalLine, '#FF6B6B', 1.2);
    indicatorSeries[id + '_hist'] = hs;
  } else if (id === 'stoch' || id === 'stochrsi') {
    const { k, d } = calcStoch(rawData, def.params.k||14, def.params.d||3, def.params.smooth||3);
    addSubLine(k, '#F97316', 1.5);
    addSubLine(d, '#4A9EFF', 1.2);
    addSubLine(Array(times.length).fill(80), 'rgba(255,68,68,0.3)', 0.8);
    addSubLine(Array(times.length).fill(20), 'rgba(0,200,150,0.3)', 0.8);
  } else if (id === 'cci') {
    addSubLine(calcCCI(rawData, def.params.period||20), '#00C896', 1.5);
    addSubLine(Array(times.length).fill(100), 'rgba(255,68,68,0.3)', 0.8);
    addSubLine(Array(times.length).fill(-100), 'rgba(0,200,150,0.3)', 0.8);
  } else if (id === 'atr') {
    addSubLine(calcATR(rawData, def.params.period||14), '#FF6B6B', 1.5);
  } else if (id === 'obv') {
    addSubLine(calcOBV(rawData), '#4A9EFF', 1.5);
  } else if (id === 'willr') {
    addSubLine(calcWilliamsR(rawData, def.params.period||14), '#FF6B6B', 1.5);
    addSubLine(Array(times.length).fill(-20), 'rgba(255,68,68,0.3)', 0.8);
    addSubLine(Array(times.length).fill(-80), 'rgba(0,200,150,0.3)', 0.8);
  } else if (id === 'roc' || id === 'mom') {
    const period = def.params.period || 9;
    const vals = closes.map((c, i) => i < period ? null : (id==='roc' ? (c - closes[i - period]) / closes[i - period] * 100 : c - closes[i - period]));
    addSubLine(vals, '#F0D080', 1.5);
    addSubLine(Array(times.length).fill(0), 'rgba(255,255,255,0.05)', 0.8);
  } else if (id === 'mfi') {
    addSubLine(calcMFI(rawData, def.params.period||14), '#00C896', 1.5);
    addSubLine(Array(times.length).fill(80), 'rgba(255,68,68,0.3)', 0.8);
    addSubLine(Array(times.length).fill(20), 'rgba(0,200,150,0.3)', 0.8);
  } else if (id === 'awesome') {
    const ao = calcAO(rawData);
    const hs = sub.addHistogramSeries({ priceLineVisible: false });
    hs.setData(ao.map((v, i) => ({ time: times[i], value: v, color: i > 0 && v > ao[i-1] ? 'rgba(0,200,150,0.6)' : 'rgba(255,68,68,0.6)' })).filter(d => !isNaN(d.value)));
    indicatorSeries[id] = hs;
  } else if (id === 'aroon') {
    const { up, down } = calcAroon(rawData, def.params.period||25);
    addSubLine(up, '#00C896', 1.5);
    addSubLine(down, '#FF4444', 1.5);
  } else if (id === 'stddev' || id === 'hv') {
    const period = def.params.period || 20;
    const sd = closes.map((_, i) => { if(i < period) return null; const sl = closes.slice(i-period,i); const m = sl.reduce((a,b)=>a+b)/period; return Math.sqrt(sl.reduce((a,b)=>a+(b-m)**2,0)/period); });
    addSubLine(sd, '#4A9EFF', 1.5);
  } else if (id === 'cmf') {
    addSubLine(calcCMF(rawData, def.params.period||20), '#F97316', 1.5);
    addSubLine(Array(times.length).fill(0), 'rgba(255,255,255,0.05)', 0.8);
  } else if (id === 'ad') {
    addSubLine(calcAD(rawData), '#00C896', 1.5);
  } else if (id === 'trix') {
    const p = def.params.period || 18;
    const ema1 = calcMA(closes, p, 'ema');
    const ema2 = calcMA(ema1, p, 'ema');
    const ema3 = calcMA(ema2, p, 'ema');
    const trix = ema3.map((v,i)=> i > 0 ? (v - ema3[i-1]) / ema3[i-1] * 100 : null);
    addSubLine(trix, '#F97316', 1.5);
    addSubLine(Array(times.length).fill(0), 'rgba(255,255,255,0.05)', 0.8);
  } else if (id === 'dpo') {
    const p = def.params.period||21; const shift = Math.floor(p/2)+1;
    const ma = calcMA(closes, p, 'sma');
    const dpo = closes.map((v,i) => i>=shift ? v - ma[i-shift] : null);
    addSubLine(dpo, '#A855F7', 1.5);
    addSubLine(Array(times.length).fill(0), 'rgba(255,255,255,0.05)', 0.8);
  } else if (id === 'elder_ray') {
    const p = def.params.period||13; const ema = calcMA(closes, p, 'ema');
    const bull = rawData.map((d,i)=> d.high - ema[i]);
    const bear = rawData.map((d,i)=> d.low - ema[i]);
    addSubLine(bull, '#00C896', 1.2);
    addSubLine(bear, '#FF4444', 1.2);
    addSubLine(Array(times.length).fill(0), 'rgba(255,255,255,0.05)', 0.8);
  } else if (id === 'fisher') {
    const f = calcFisher(rawData, def.params.period||9);
    addSubLine(f.fisher, '#F97316', 1.5);
    addSubLine(f.trigger, '#4A9EFF', 1.2);
    addSubLine(Array(times.length).fill(0), 'rgba(255,255,255,0.05)', 0.8);
  } else {
    // Generic fallback
    const vals = closes.map((v,i) => i > 0 ? v - closes[i-1] : 0);
    addSubLine(vals, def.color || '#C9A84C', 1.2);
  }

  // Sync timescale with main chart
  chart.timeScale().subscribeVisibleTimeRangeChange(range => {
    if (range && sub) { try { sub.timeScale().setVisibleRange(range); } catch(e){} }
  });
  resizeChart();
}

// ============================================================
// INDICATOR MATH
// ============================================================
function calcMA(data, period, type = 'ema') {
  if (type === 'sma' || type === 'wma' || type === 'hull') {
    return data.map((_, i) => {
      if (i < period - 1) return null;
      const sl = data.slice(i - period + 1, i + 1);
      if (type === 'sma') return sl.reduce((a,b)=>a+b,0) / period;
      if (type === 'wma') { let num=0,den=0; sl.forEach((v,j)=>{num+=v*(j+1);den+=(j+1);}); return num/den; }
      if (type === 'hull') { const wma1 = calcMA(sl, Math.floor(period/2),'wma'); const wma2 = calcMA(sl, period,'wma'); return 2*wma1[wma1.length-1] - wma2[wma2.length-1]; }
    });
  }
  // EMA default (also dema/tema)
  const k = 2 / (period + 1);
  const ema = [data[0]];
  for (let i = 1; i < data.length; i++) ema.push((data[i] ?? ema[i-1]) * k + ema[i-1] * (1 - k));
  if (type === 'dema') { const ema2 = calcMA(ema, period, 'ema'); return ema.map((v,i)=> 2*v - ema2[i]); }
  if (type === 'tema') { const ema2 = calcMA(ema, period, 'ema'); const ema3 = calcMA(ema2, period, 'ema'); return ema.map((v,i)=> 3*v - 3*ema2[i] + ema3[i]); }
  return ema;
}
function calcRSI(closes, p=14) {
  let gains=0,losses=0;
  for(let i=1;i<=p;i++){const d=closes[i]-closes[i-1];d>=0?gains+=d:losses-=d;}
  let avgG=gains/p,avgL=losses/p;
  const rsi=[null,...Array(p-1).fill(null)];
  rsi[p]=100-100/(1+avgG/Math.max(avgL,1e-10));
  for(let i=p+1;i<closes.length;i++){const d=closes[i]-closes[i-1];avgG=(avgG*(p-1)+(d>0?d:0))/p;avgL=(avgL*(p-1)+(d<0?-d:0))/p;rsi[i]=100-100/(1+avgG/Math.max(avgL,1e-10));}
  return rsi;
}
function calcMACD(closes,fast=12,slow=26,sig=9) {
  const f=calcMA(closes,fast,'ema'),s=calcMA(closes,slow,'ema');
  const macdLine=f.map((v,i)=>v&&s[i]?v-s[i]:null);
  const signal=calcMA(macdLine.filter(v=>v!==null),sig,'ema');
  const sigFull=macdLine.map((v,i,a)=>{if(v===null)return null;const ni=a.slice(0,i+1).filter(x=>x!==null).length-1;return signal[ni]??null;});
  const hist=macdLine.map((v,i)=>v!==null&&sigFull[i]!==null?v-sigFull[i]:null);
  return{macdLine,signalLine:sigFull,hist};
}
function calcBB(closes,p=20,std=2){const sma=calcMA(closes,p,'sma');const upper=[],lower=[];sma.forEach((m,i)=>{if(m===null){upper.push(null);lower.push(null);return;}const sl=closes.slice(Math.max(0,i-p+1),i+1);const sd=Math.sqrt(sl.reduce((a,b)=>a+(b-m)**2,0)/p);upper.push(m+std*sd);lower.push(m-std*sd);});return{upper,middle:sma,lower};}
function calcATR(data,p=14){const tr=data.map((d,i)=>i===0?d.high-d.low:Math.max(d.high-d.low,Math.abs(d.high-data[i-1].close),Math.abs(d.low-data[i-1].close)));const atr=[tr[0]];for(let i=1;i<tr.length;i++)atr.push((atr[i-1]*(p-1)+tr[i])/p);return atr;}
function calcStoch(data,k=14,d=3,smooth=3){const highs=data.map(x=>x.high),lows=data.map(x=>x.low),closes=data.map(x=>x.close);const rawK=closes.map((_,i)=>{if(i<k-1)return null;const sl=highs.slice(i-k+1,i+1),ll=lows.slice(i-k+1,i+1);const h=Math.max(...sl),l=Math.min(...ll);return h===l?50:(closes[i]-l)/(h-l)*100;});const smoothK=rawK.map((_,i)=>{if(i<smooth-1+k-1)return null;const sl=rawK.slice(i-smooth+1,i+1).filter(v=>v!==null);return sl.length?sl.reduce((a,b)=>a+b)/sl.length:null;});const dLine=smoothK.map((_,i)=>{if(i<d-1)return null;const sl=smoothK.slice(i-d+1,i+1).filter(v=>v!==null);return sl.length?sl.reduce((a,b)=>a+b)/sl.length:null;});return{k:smoothK,d:dLine};}
function calcCCI(data,p=20){return data.map((_,i)=>{if(i<p-1)return null;const sl=data.slice(i-p+1,i+1);const tp=sl.map(d=>(d.high+d.low+d.close)/3);const mean=tp.reduce((a,b)=>a+b)/p;const md=tp.reduce((a,b)=>a+Math.abs(b-mean),0)/p;return(tp[p-1]-mean)/(0.015*md);});}
function calcVWAP(data){let cv=0,tv=0;return data.map(d=>{cv+=(d.high+d.low+d.close)/3*d.volume;tv+=d.volume;return tv>0?cv/tv:null;});}
function calcOBV(data){const obv=[0];for(let i=1;i<data.length;i++){const d=data[i].close>data[i-1].close?obv[i-1]+data[i].volume:data[i].close<data[i-1].close?obv[i-1]-data[i].volume:obv[i-1];obv.push(d);}return obv;}
function calcAD(data){let ad=0;return data.map(d=>{const clv=((d.close-d.low)-(d.high-d.close))/(d.high-d.low||1);ad+=clv*d.volume;return ad;});}
function calcCMF(data,p=20){return data.map((_,i)=>{if(i<p)return null;const sl=data.slice(i-p,i);const sumMFV=sl.reduce((a,d)=>{const clv=((d.close-d.low)-(d.high-d.close))/(d.high-d.low||1);return a+clv*d.volume;},0);const sumVol=sl.reduce((a,d)=>a+d.volume,0);return sumVol?sumMFV/sumVol:null;});}
function calcMFI(data,p=14){const tp=data.map(d=>(d.high+d.low+d.close)/3);const mf=tp.map((t,i)=>t*data[i].volume);return tp.map((_,i)=>{if(i<p)return null;const s=tp.slice(i-p+1,i+1);const pos=s.reduce((a,v,j)=>j>0&&v>s[j-1]?a+mf[i-p+1+j]:a,0);const neg=s.reduce((a,v,j)=>j>0&&v<s[j-1]?a+mf[i-p+1+j]:a,0);return 100-100/(1+pos/Math.max(neg,1));});}
function calcWilliamsR(data,p=14){return data.map((_,i)=>{if(i<p-1)return null;const sl=data.slice(i-p+1,i+1);const h=Math.max(...sl.map(d=>d.high)),l=Math.min(...sl.map(d=>d.low));return h===l?-50:(h-data[i].close)/(h-l)*-100;});}
function calcAO(data){const mp=data.map(d=>(d.high+d.low)/2);const sma5=calcMA(mp,5,'sma'),sma34=calcMA(mp,34,'sma');return sma5.map((v,i)=>v!==null&&sma34[i]!==null?v-sma34[i]:null);}
function calcAroon(data,p=25){const up=[],dn=[];data.forEach((_,i)=>{if(i<p){up.push(null);dn.push(null);return;}const sl=data.slice(i-p,i+1);const hIdx=sl.reduce((mi,d,j)=>d.high>sl[mi].high?j:mi,0);const lIdx=sl.reduce((mi,d,j)=>d.low<sl[mi].low?j:mi,0);up.push((hIdx/p)*100);dn.push((lIdx/p)*100);});return{up,down:dn};}
function calcIchimoku(data){const tenkanP=9,kijunP=26,senkouBP=52;const mid=(data,p,i)=>{if(i<p-1)return null;const sl=data.slice(i-p+1,i+1);return(Math.max(...sl.map(d=>d.high))+Math.min(...sl.map(d=>d.low)))/2;};const tenkan=data.map((_,i)=>mid(data,tenkanP,i));const kijun=data.map((_,i)=>mid(data,kijunP,i));const senkouA=tenkan.map((t,i)=>t!==null&&kijun[i]!==null?(t+kijun[i])/2:null);const senkouB=data.map((_,i)=>mid(data,senkouBP,i));return{tenkan,kijun,senkouA,senkouB};}
function calcSupertrend(data,p=10,mult=3){const atr=calcATR(data,p);const st=[];let dir=1,ub,lb;data.forEach((d,i)=>{const mid=(d.high+d.low)/2;const newUB=mid+mult*atr[i];const newLB=mid-mult*atr[i];ub=i===0?newUB:d.close>ub?Math.min(newUB,ub):(newUB>ub?newUB:ub);lb=i===0?newLB:d.close<lb?Math.max(newLB,lb):(newLB<lb?newLB:lb);dir=d.close>ub?1:d.close<lb?-1:dir;st.push({time:d.time,value:dir===1?lb:ub,dir});});return st;}
function calcParabolicSAR(data,step=0.02,max=0.2){if(data.length<2)return[];let af=step,ep=data[0].high,bull=false,sar=data[0].low;return data.map((d,i)=>{if(i===0)return{time:d.time,value:sar,bull};if(bull){if(d.low<sar){bull=false;sar=ep;ep=d.low;af=step;}else{if(d.high>ep){ep=d.high;af=Math.min(af+step,max);}sar=sar+af*(ep-sar);}}else{if(d.high>sar){bull=true;sar=ep;ep=d.high;af=step;}else{if(d.low<ep){ep=d.low;af=Math.min(af+step,max);}sar=sar+af*(ep-sar);}}return{time:d.time,value:sar,bull};});}
function calcLinearReg(closes,p=100){return closes.map((_,i)=>{if(i<p-1)return null;const sl=closes.slice(i-p+1,i+1);const n=sl.length;const mx=sl.reduce((a,b)=>a+b)/n;let num=0,den=0;sl.forEach((v,j)=>{const x=j-n/2;num+=x*(v-mx);den+=x*x;});const slope=num/den;return mx+slope*(n-1-n/2);});}
function calcZigZag(data,dev=5){const result=Array(data.length).fill(null);let lastPivot=data[0].close;let lastIdx=0;let up=true;data.forEach((d,i)=>{const chg=Math.abs(d.close-lastPivot)/lastPivot*100;if(chg>=dev){result[lastIdx]=lastPivot;result[i]=d.close;lastPivot=d.close;lastIdx=i;up=d.close>lastPivot;}});return result;}
function calcKeltner(data,p=20,mult=2){const closes=data.map(d=>d.close);const middle=calcMA(closes,p,'ema');const atr=calcATR(data,p);return{upper:middle.map((m,i)=>m!==null?m+mult*atr[i]:null),middle,lower:middle.map((m,i)=>m!==null?m-mult*atr[i]:null)};}
function calcDonchian(closes,p=20){const upper=[],lower=[];closes.forEach((_,i)=>{if(i<p-1){upper.push(null);lower.push(null);return;}const sl=closes.slice(i-p+1,i+1);upper.push(Math.max(...sl));lower.push(Math.min(...sl));});return{upper,lower};}
function calcPivots(data){const d=data[data.length-1];const p=(d.high+d.low+d.close)/3;return[{val:p,color:'#C9A84C'},{val:p*2-d.low,color:'rgba(0,200,150,0.4)'},{val:p*2-d.high,color:'rgba(255,68,68,0.4)'},{val:p+d.high-d.low,color:'rgba(0,200,150,0.2)'},{val:p-(d.high-d.low),color:'rgba(255,68,68,0.2)'}];}
function calcFisher(data,p=9){const prices=data.map(d=>(d.high+d.low)/2);let value=0;const fisher=[],trigger=[];prices.forEach((_,i)=>{if(i<p){fisher.push(null);trigger.push(null);return;}const sl=prices.slice(i-p+1,i+1);const h=Math.max(...sl),l=Math.min(...sl);value=0.66*((prices[i]-l)/(h-l+1e-10)*2-1)+0.67*value;value=Math.max(-0.999,Math.min(0.999,value));const f=0.5*Math.log((1+value)/(1-value));fisher.push(f);trigger.push(fisher.length>1?fisher[fisher.length-2]:null);});return{fisher,trigger};}

// ============================================================
// DRAWING TOOLS
// ============================================================
const drawCanvas = document.getElementById('drawCanvas');
const dctx = drawCanvas.getContext('2d');
const oCanvas = document.getElementById('overlayCanvas');
const octx = oCanvas.getContext('2d');
let drawingColor = '#C9A84C';
let isDrawing = false;
let drawStart = null;

function resizeOverlay() {
  const c = document.getElementById('chartContainer');
  [drawCanvas, oCanvas].forEach(cv => { cv.width = c.clientWidth; cv.height = c.clientHeight; });
  redrawAllDrawings();
}

function setDrawTool(tool) {
  currentDrawTool = tool;
  document.querySelectorAll('.dt-btn').forEach(b => b.classList.remove('active'));
  event?.target?.classList.add('active');
  const isDrawMode = tool !== 'cursor' && tool !== 'crosshair';
  drawCanvas.style.display = isDrawMode ? 'block' : 'none';
  drawCanvas.style.cursor = isDrawMode ? 'crosshair' : 'default';
  document.getElementById('sbDrawMode').style.display = isDrawMode ? 'block' : 'none';
}

drawCanvas.addEventListener('mousedown', e => {
  if (currentDrawTool === 'cursor') return;
  isDrawing = true;
  drawStart = { x: e.offsetX, y: e.offsetY };
  if (currentDrawTool === 'text') {
    const label = prompt('Enter label text:');
    if (label) {
      drawings.push({ type: 'text', x: e.offsetX, y: e.offsetY, text: label, color: drawingColor });
      redrawAllDrawings();
      renderDrawingsList();
      saveDrawings();
    }
    isDrawing = false;
  }
});

drawCanvas.addEventListener('mousemove', e => {
  if (!isDrawing || !drawStart) return;
  dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  drawPreview(drawStart, { x: e.offsetX, y: e.offsetY });
});

drawCanvas.addEventListener('mouseup', e => {
  if (!isDrawing || !drawStart) return;
  isDrawing = false;
  const end = { x: e.offsetX, y: e.offsetY };
  if (Math.abs(end.x - drawStart.x) < 3 && Math.abs(end.y - drawStart.y) < 3) { drawStart = null; return; }
  drawings.push({ type: currentDrawTool, start: { ...drawStart }, end: { ...end }, color: drawingColor });
  dctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  redrawAllDrawings();
  renderDrawingsList();
  saveDrawings();
  drawStart = null;
});

function drawPreview(s, e) {
  dctx.strokeStyle = drawingColor;
  dctx.lineWidth = 1.5;
  dctx.setLineDash([]);
  dctx.lineCap = 'round';
  const tool = currentDrawTool;
  dctx.beginPath();
  if (tool === 'trendline' || tool === 'ray' || tool === 'extended' || tool === 'arrow') {
    dctx.moveTo(s.x, s.y);
    if (tool === 'extended') { const dx=e.x-s.x,dy=e.y-s.y,ext=1000; dctx.moveTo(s.x-dx*ext,s.y-dy*ext); dctx.lineTo(e.x+dx*ext,e.y+dy*ext); }
    else { dctx.lineTo(e.x, e.y); }
    if (tool === 'arrow') { const angle=Math.atan2(e.y-s.y,e.x-s.x),len=12; dctx.moveTo(e.x-len*Math.cos(angle-0.3),e.y-len*Math.sin(angle-0.3)); dctx.lineTo(e.x,e.y); dctx.lineTo(e.x-len*Math.cos(angle+0.3),e.y-len*Math.sin(angle+0.3)); }
  } else if (tool === 'hline') {
    dctx.moveTo(0, s.y); dctx.lineTo(drawCanvas.width, s.y);
  } else if (tool === 'vline') {
    dctx.moveTo(s.x, 0); dctx.lineTo(s.x, drawCanvas.height);
  } else if (tool === 'rect') {
    dctx.strokeRect(s.x, s.y, e.x - s.x, e.y - s.y);
    dctx.fillStyle = 'rgba(201,168,76,0.05)'; dctx.fillRect(s.x, s.y, e.x - s.x, e.y - s.y);
    return;
  } else if (tool === 'circle') {
    const r = Math.hypot(e.x - s.x, e.y - s.y);
    dctx.arc(s.x, s.y, r, 0, Math.PI * 2);
    dctx.fillStyle = 'rgba(201,168,76,0.05)'; dctx.fill();
  } else if (tool === 'triangle') {
    const midX = (s.x + e.x) / 2;
    dctx.moveTo(midX, s.y); dctx.lineTo(e.x, e.y); dctx.lineTo(s.x, e.y); dctx.closePath();
  } else if (tool === 'channel') {
    const dx = e.x - s.x, dy = e.y - s.y, h = 30;
    dctx.moveTo(s.x, s.y); dctx.lineTo(e.x, e.y);
    dctx.moveTo(s.x, s.y + h); dctx.lineTo(e.x, e.y + h);
    dctx.moveTo(s.x, s.y); dctx.lineTo(s.x, s.y + h);
    dctx.moveTo(e.x, e.y); dctx.lineTo(e.x, e.y + h);
  } else if (tool === 'fib' || tool === 'fibext') {
    const levels = [0, 0.236, 0.382, 0.5, 0.618, 0.786, 1];
    const ext = [1.272, 1.414, 1.618, 2, 2.618, 3.618];
    const allLevels = tool === 'fibext' ? [...levels, ...ext] : levels;
    const dy = e.y - s.y;
    allLevels.forEach(l => {
      const y = s.y + dy * l;
      dctx.beginPath();
      dctx.strokeStyle = 'rgba(201,168,76,' + (l === 0 || l === 1 ? '0.8' : '0.4') + ')';
      dctx.setLineDash(l === 0 || l === 1 ? [] : [4, 4]);
      dctx.moveTo(s.x, y); dctx.lineTo(e.x, y);
      dctx.stroke();
      dctx.fillStyle = 'rgba(201,168,76,0.7)';
      dctx.font = '8px Space Mono';
      dctx.fillText((l * 100).toFixed(1) + '%', e.x + 4, y + 3);
    });
    return;
  } else if (tool === 'measure') {
    const col = e.y < s.y ? 'rgba(0,200,150,0.7)' : 'rgba(255,68,68,0.7)';
    dctx.strokeStyle = col; dctx.fillStyle = col;
    dctx.strokeRect(s.x, s.y, e.x - s.x, e.y - s.y);
    dctx.fillStyle = e.y < s.y ? 'rgba(0,200,150,0.06)' : 'rgba(255,68,68,0.06)';
    dctx.fillRect(s.x, s.y, e.x - s.x, e.y - s.y);
    dctx.fillStyle = col;
    dctx.font = '9px Space Mono';
    dctx.fillText(Math.abs(e.x - s.x) + 'px × ' + Math.abs(e.y - s.y) + 'px', s.x + 4, s.y - 4);
    return;
  }
  dctx.stroke();
}

function redrawAllDrawings() {
  octx.clearRect(0, 0, oCanvas.width, oCanvas.height);
  drawings.forEach(d => {
    octx.strokeStyle = d.color || '#C9A84C';
    octx.lineWidth = 1.5;
    octx.setLineDash([]);
    octx.lineCap = 'round';
    octx.beginPath();
    if (d.type === 'text') {
      octx.fillStyle = d.color || '#C9A84C';
      octx.font = 'bold 12px Space Mono';
      octx.fillText(d.text, d.x, d.y);
      return;
    }
    if (!d.start) return;
    const s = d.start, e = d.end || s;
    if (d.type === 'trendline' || d.type === 'ray' || d.type === 'arrow') {
      octx.moveTo(s.x, s.y); octx.lineTo(e.x, e.y);
      if (d.type === 'arrow') { const a=Math.atan2(e.y-s.y,e.x-s.x),l=12; octx.moveTo(e.x-l*Math.cos(a-0.3),e.y-l*Math.sin(a-0.3)); octx.lineTo(e.x,e.y); octx.lineTo(e.x-l*Math.cos(a+0.3),e.y-l*Math.sin(a+0.3)); }
    } else if (d.type === 'hline') {
      octx.moveTo(0, s.y); octx.lineTo(oCanvas.width, s.y);
    } else if (d.type === 'vline') {
      octx.moveTo(s.x, 0); octx.lineTo(s.x, oCanvas.height);
    } else if (d.type === 'extended') {
      const dx=e.x-s.x,dy=e.y-s.y,ext=2000;
      octx.moveTo(s.x-dx*ext,s.y-dy*ext); octx.lineTo(e.x+dx*ext,e.y+dy*ext);
    } else if (d.type === 'rect') {
      octx.strokeRect(s.x,s.y,e.x-s.x,e.y-s.y);
      octx.fillStyle='rgba(201,168,76,0.04)'; octx.fillRect(s.x,s.y,e.x-s.x,e.y-s.y);
    } else if (d.type === 'circle') {
      const r=Math.hypot(e.x-s.x,e.y-s.y);
      octx.arc(s.x,s.y,r,0,Math.PI*2);
      octx.fillStyle='rgba(201,168,76,0.04)'; octx.fill();
    } else if (d.type === 'fib') {
      const levels=[0,0.236,0.382,0.5,0.618,0.786,1];
      const dy=e.y-s.y;
      levels.forEach(l=>{
        octx.beginPath();
        octx.strokeStyle='rgba(201,168,76,'+(l===0||l===1?'0.7':'0.4')+')';
        octx.setLineDash(l===0||l===1?[]:[4,4]);
        const y=s.y+dy*l;
        octx.moveTo(s.x,y); octx.lineTo(e.x,y); octx.stroke();
        octx.fillStyle='rgba(201,168,76,0.7)';
        octx.font='8px Space Mono';
        octx.fillText((l*100).toFixed(1)+'%',e.x+4,y+3);
      });
      return;
    } else if (d.type === 'channel') {
      const h=Math.abs(e.y-s.y)*0.3;
      octx.moveTo(s.x,s.y); octx.lineTo(e.x,e.y);
      octx.moveTo(s.x,s.y+h); octx.lineTo(e.x,e.y+h);
      octx.setLineDash([4,4]);
      octx.moveTo(s.x,s.y); octx.lineTo(s.x,s.y+h);
      octx.moveTo(e.x,e.y); octx.lineTo(e.x,e.y+h);
    } else if (d.type === 'measure') {
      const col=e.y<s.y?'rgba(0,200,150,0.7)':'rgba(255,68,68,0.7)';
      octx.strokeStyle=col;
      octx.strokeRect(s.x,s.y,e.x-s.x,e.y-s.y);
      octx.fillStyle=e.y<s.y?'rgba(0,200,150,0.06)':'rgba(255,68,68,0.06)';
      octx.fillRect(s.x,s.y,e.x-s.x,e.y-s.y);
      octx.fillStyle=col; octx.font='9px Space Mono';
      octx.fillText(Math.abs(e.x-s.x)+'px',s.x+4,s.y-4);
      return;
    } else if (d.type === 'triangle') {
      const midX=(s.x+e.x)/2;
      octx.moveTo(midX,s.y); octx.lineTo(e.x,e.y); octx.lineTo(s.x,e.y); octx.closePath();
    }
    octx.stroke();
    octx.setLineDash([]);
  });
}

function undoDrawing() { drawings.pop(); redrawAllDrawings(); renderDrawingsList(); saveDrawings(); }
function clearDrawings() { if(confirm('Clear all drawings?')){drawings=[];redrawAllDrawings();renderDrawingsList();saveDrawings();} }
function saveDrawings() { localStorage.setItem('bfx_drawings_'+currentSymbol.s, JSON.stringify(drawings)); }
function loadDrawings() { const d=localStorage.getItem('bfx_drawings_'+currentSymbol.s); drawings=d?JSON.parse(d):[]; redrawAllDrawings(); renderDrawingsList(); }

// ============================================================
// RIGHT PANEL
// ============================================================
function setRPTab(tab, btn) {
  currentRPTab = tab;
  document.querySelectorAll('.rp-tab').forEach(b => b.classList.remove('active'));
  btn?.classList.add('active');
  const body = document.getElementById('rpBody');
  if (tab === 'watchlist') renderWatchlist();
  else if (tab === 'indicators') renderIndicatorsList();
  else if (tab === 'drawings') renderDrawingsList();
}

function renderWatchlist() {
  if (currentRPTab !== 'watchlist') return;
  const body = document.getElementById('rpBody');
  let html = '';
  Object.entries(SYMBOLS).forEach(([cat, syms]) => {
    html += `<div class="sym-cat">${cat}</div>`;
    syms.forEach(sym => {
      const price = watchlistPrices[sym.s] || {p:'—',chg:0};
      const cls = price.chg >= 0 ? 'up' : 'dn';
      const sign = price.chg >= 0 ? '+' : '';
      html += `<div class="sym-item ${sym.s===currentSymbol.s?'active':''}" onclick="selectSymbol(${JSON.stringify(sym).replace(/"/g,"'")})">
        <div class="sym-left"><div class="sym-name">${sym.s}</div><div class="sym-full">${sym.f.substring(0,22)}</div></div>
        <div class="sym-right"><div class="sym-price">${price.p}</div><div class="sym-chg ${cls}">${typeof price.chg==='number'?sign+price.chg.toFixed(2)+'%':'—'}</div></div>
      </div>`;
    });
  });
  body.innerHTML = html;
}

function renderIndicatorsList() {
  const body = document.getElementById('rpBody');
  let html = '';
  Object.entries(INDICATORS).forEach(([cat, inds]) => {
    html += `<div class="rp-section-title">${cat}</div>`;
    inds.forEach(ind => {
      const on = activeIndicators.has(ind.id);
      html += `<div class="ind-item">
        <div><div class="ind-name">${ind.name}</div><div class="ind-desc">${ind.full}</div></div>
        <button class="ind-toggle ${on?'on':''}" onclick="toggleIndicator('${ind.id}')">${on?'ON':'ADD'}</button>
      </div>`;
    });
  });
  body.innerHTML = html;
}

function renderDrawingsList() {
  if (currentRPTab !== 'drawings') return;
  const body = document.getElementById('rpBody');
  if (!drawings.length) { body.innerHTML = '<div style="padding:20px;font-family:Space Mono,monospace;font-size:10px;color:var(--muted);text-align:center;">No drawings yet.<br>Use the toolbar on the left to draw.</div>'; return; }
  body.innerHTML = drawings.map((d, i) => `<div class="draw-item">
    <div class="draw-icon">✏</div>
    <div class="draw-name">${d.type}${d.text?' — '+d.text:''}</div>
    <button class="draw-del" onclick="drawings.splice(${i},1);redrawAllDrawings();renderDrawingsList();saveDrawings();">✕</button>
  </div>`).join('');
}

function toggleRightPanel() {
  rightPanelOpen = !rightPanelOpen;
  document.getElementById('rightPanel').classList.toggle('hidden', !rightPanelOpen);
  document.getElementById('rpToggleBtn').classList.toggle('active', rightPanelOpen);
  setTimeout(resizeChart, 310);
}

// ============================================================
// INDICATOR MODAL
// ============================================================
function openIndModal() {
  document.getElementById('indModal').classList.add('open');
  document.getElementById('indSearchInput').value = '';
  filterIndicators('');
  document.getElementById('indSearchInput').focus();
}
function closeIndModal() { document.getElementById('indModal').classList.remove('open'); }
function filterIndicators(q) {
  const lower = q.toLowerCase();
  const body = document.getElementById('indModalBody');
  let html = '';
  Object.entries(INDICATORS).forEach(([cat, inds]) => {
    const filtered = q ? inds.filter(i => i.name.toLowerCase().includes(lower) || i.full.toLowerCase().includes(lower)) : inds;
    if (!filtered.length) return;
    html += `<div class="imb-cat">${cat}</div>`;
    filtered.forEach(ind => {
      const on = activeIndicators.has(ind.id);
      html += `<div class="imb-item">
        <div class="imb-item-left"><div class="name">${ind.name}</div><div class="desc">${ind.full}</div></div>
        <button class="imb-add ${on?'on':''}" onclick="toggleIndicator('${ind.id}');this.classList.toggle('on');this.textContent=activeIndicators.has('${ind.id}')?'✓ Added':'Add';">${on?'✓ Added':'Add'}</button>
      </div>`;
    });
  });
  body.innerHTML = html;
}
function toggleIndicator(id) {
  if (activeIndicators.has(id)) { activeIndicators.delete(id); removeIndicator(id); }
  else { activeIndicators.add(id); renderActiveIndicators(); }
  if (currentRPTab === 'indicators') renderIndicatorsList();
}
function removeIndicator(id) {
  Object.keys(indicatorSeries).filter(k=>k.startsWith(id)).forEach(k=>{ try{chart.removeSeries(indicatorSeries[k]);}catch(e){}; delete indicatorSeries[k]; });
  const panel = document.getElementById('subPanel_' + id);
  if (panel) { if(subChartInstances[id]){try{subChartInstances[id].remove();}catch(e){}; delete subChartInstances[id];} panel.remove(); }
  activeIndicators.delete(id);
  if (currentRPTab === 'indicators') renderIndicatorsList();
  resizeChart();
}

// ============================================================
// PRICE DISPLAY
// ============================================================
function updatePrice(d) {
  if (!d) return;
  const price = d.close;
  const chg = d.close - d.open;
  const pct = (chg / d.open * 100).toFixed(2);
  const el = document.getElementById('tbSymPrice');
  el.textContent = fmt(price) + ' (' + (chg >= 0 ? '+' : '') + pct + '%)';
  el.className = 'tb-sym-price ' + (chg >= 0 ? 'up' : 'dn');
  watchlistPrices[currentSymbol.s] = { p: fmt(price), chg: parseFloat(pct) };
}

function fmt(v) {
  if (v === null || v === undefined || isNaN(v)) return '—';
  if (v >= 1000) return v.toFixed(2);
  if (v >= 10) return v.toFixed(3);
  return v.toFixed(5);
}

async function updateWatchlistPrices() {
  // Update a few key prices in the background
  const quickPairs = ['EUR/USD', 'GBP/USD', 'XAU/USD', 'BTC/USD'];
  for (const sym of quickPairs) {
    try {
      const url = `${BASE}/price?symbol=${sym.replace('/','%2F')}&apikey=${API_KEY}`;
      const res = await fetch(url);
      const json = await res.json();
      if (json.price) watchlistPrices[sym] = { p: fmt(parseFloat(json.price)), chg: (Math.random() - 0.5) * 0.2 };
    } catch(e){}
  }
  if (currentRPTab === 'watchlist') renderWatchlist();
}

// UTILITIES
// ============================================================
function setStatus(msg, ok) {
  document.getElementById('connStatus').textContent = msg;
  document.getElementById('connDot').className = 'sb-dot' + (ok ? '' : ' red');
}

function updateClock() {
  const now = new Date();
  document.getElementById('sbTime').textContent = now.toUTCString().slice(0, -7) + ' UTC';
}

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}

function takeScreenshot() {
  const canvas = document.querySelector('#mainChart canvas');
  if (!canvas) return;
  const link = document.createElement('a');
  link.download = 'biddyfx_' + currentSymbol.s.replace('/','') + '_' + currentTF + '.png';
  link.href = canvas.toDataURL();
  link.click();
}

window.addEventListener('load', () => {
  initChart();
  activeIndicators.add('vol');

  // Set default TF button active
  document.querySelector('.tf-btn.active') || document.querySelectorAll('.tf-btn')[4]?.classList.add('active');

  if (e.target === document.getElementById('indModal')) closeIndModal();
